<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Time Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Flight Time Calculator</h1>

    <label for="blockOff">Block Off</label>
    <input
        type="text"
        id="blockOff"
        inputmode="numeric"
        maxlength="5"
        placeholder="HHMM"
        oninput="formatTimeInput(this); calculate();">

    <label for="takeoff">Takeoff</label>
    <input
        type="text"
        id="takeoff"
        inputmode="numeric"
        maxlength="5"
        placeholder="HHMM"
        oninput="formatTimeInput(this); calculate();">

    <label for="landing">Landing</label>
    <input
        type="text"
        id="landing"
        inputmode="numeric"
        maxlength="5"
        placeholder="HHMM"
        oninput="formatTimeInput(this); calculate();">

    <label for="blockOn">Block On</label>
    <input
        type="text"
        id="blockOn"
        inputmode="numeric"
        maxlength="5"
        placeholder="HHMM"
        oninput="formatTimeInput(this); calculate();">

    <button onclick="resetForm()" class="reset-btn">
        Reset
    </button>

    <div class="results">
        <p>Block Time: <span id="blockTime">00:00</span></p>
        <p>Time In Service: <span id="serviceTime">00:00</span></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
