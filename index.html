<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Time Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Flight Time Calculator</h1>

    <label>Block Off</label>
    <input type="time" id="blockOff">

    <label>Takeoff</label>
    <input type="time" id="takeoff">

    <label>Landing</label>
    <input type="time" id="landing">

    <label>Block On</label>
    <input type="time" id="blockOn">

    <button onclick="calculate()">Calculate</button>

    <div class="results">
        <p>Block Time: <span id="blockTime">00:00</span></p>
        <p>Time In Service: <span id="serviceTime">00:00</span></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
